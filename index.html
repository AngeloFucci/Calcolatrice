<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Calcolatrice</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</head>

<body style="margin:40px">

    <div class="row justify-content-center">

        <input type="text" id="display" class="form-control mb-3" disabled>

        <div class="col-3"><button class="btn btn-danger w-100" onclick="azzera()">C</button></div>
        <div class="col-3"><button class="btn btn-warning w-100" onclick="cancella()">CE</button></div>
        <div class="col-3"><button class="btn btn-secondary w-100" onclick="op('/')">/</button></div>
        <div class="col-3"><button class="btn btn-secondary w-100" onclick="op('*')">*</button></div><br><br>
                
        <div class="col-3"><button class="btn btn-light w-100" onclick="scrivi('7')">7</button></div>
        <div class="col-3"><button class="btn btn-light w-100" onclick="scrivi('8')">8</button></div>
        <div class="col-3"><button class="btn btn-light w-100" onclick="scrivi('9')">9</button></div>
        <div class="col-3"><button class="btn btn-secondary w-100" onclick="op('-')">-</button></div><br><br>
                
        <div class="col-3"><button class="btn btn-light w-100" onclick="scrivi('4')">4</button></div>
        <div class="col-3"><button class="btn btn-light w-100" onclick="scrivi('5')">5</button></div>
        <div class="col-3"><button class="btn btn-light w-100" onclick="scrivi('6')">6</button></div>
        <div class="col-3"><button class="btn btn-secondary w-100" onclick="op('+')">+</button></div><br><br>

        <div class="col-3"><button class="btn btn-light w-100" onclick="scrivi('1')">1</button></div>
        <div class="col-3"><button class="btn btn-light w-100" onclick="scrivi('2')">2</button></div>
        <div class="col-3"><button class="btn btn-light w-100" onclick="scrivi('3')">3</button></div>
        <div class="col-3"><button class="btn btn-primary w-100" onclick="uguale()">=</button></div><br><br>
                
        <div class="col-9"><button class="btn btn-light w-100" onclick="scrivi('0')">0</button></div>
        <div class="col-3"><button class="btn btn-info w-100" onclick="fattoriale()">n!</button></div>
    
    </div>
</div>


<script>
    let display = document.getElementById("display");
    let operatore = null;
    let numero1 = null;

    function scrivi(num) {
        display.value += num;//aggiungo il numero al display
    }

    function op(simbolo) {
        if (display.value !== ""){
            numero1 = parseFloat(display.value);
            operatore = simbolo;
            display.value = "";
        }
        
    }

    function uguale() {
        if (operatore !== null || display.value !== ""){
            let numero2 = parseFloat(display.value);
            let risultato;

            switch (operatore) {
                case '+': risultato = numero1 + numero2; break;
                case '-': risultato = numero1 - numero2; break;
                case '*': risultato = numero1 * numero2; break;
                case '/': risultato = numero1 / numero2; break;
            }

            display.value = risultato;
            operatore = null;
        }

        
    }

    function cancella() {
        display.value = display.value.slice(0, -1);//cancella l'ultima cifra scritta sul display
    }

    function azzera() {
        display.value = "";
        numero1 = null;
        operatore = null;
    }

    

    function fattoriale() {
        let n = parseInt(display.value);
        if (n!=="") {
            let f = 1;
            for (let i = 1; i <= n; i++){
                f *= i;
            }
            display.value = f;
        }
        
        
    }
</script>

</body>
</html>
